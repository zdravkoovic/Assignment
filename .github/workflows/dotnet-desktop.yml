name: .NET Framework Desktop

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest

    env:
      Solution_Name: Assignment.sln
      Test_Project_Path: Assignment.Tests\Assignment.Tests.csproj

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup VSTest
      uses: darenm/Setup-VSTest@v1

    - name: Restore NuGet packages
      run: nuget restore $env:Solution_Name

    - name: Build solution
      run: msbuild $env:Solution_Name /p:Configuration=Release
      
    - name: Run unit tests
      run: vstest.console.exe Assignment.Tests\bin\Release\Assignment.Tests.dll
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Assignment-Release
        path: Assignment\bin\Release\